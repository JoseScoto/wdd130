<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="description"
      content="What are you waiting for? Fill the contact us form and we will get in touch with you asap!">
    <meta name="author" content="Jose Escoto">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - The Rapids</title>
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/logo.jpg" alt="typographic logo that reads The Rapids">
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>
    <main>
        <section class="contact">
            <div class="text">
                <h2>The Rapids - Rafting Company</h2>
                <p>Col. La Glora Av. Acacias Pje. 7</p>
                <p>Santa Ana, El Salvador</p>
                <p>+503 7928-0853</p>
                <p>info@therapids.com</p>
            </div>
            <div class="map">
                <iframe
                  src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d18416.745056819458!2d-89.54926164090179!3d13.979799742254356!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sen!2ssv!4v1775615430715!5m2!1sen!2ssv"
                  style="border:0;" allowfullscreen="" loading="lazy"
                  referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>

            <div class="form">
                <form>
                    <fieldset>
                        <div class="form-item">
                            <label for="fullname">Name</label>
                            <input type="text" id="fullname" name="fullname" required>
                        </div>
                        <div class="form-item">
                            <label for="useremail">Email</label>
                            <input type="email" id="useremail" name="useremail" required>
                        </div>

                        <div class="form-item">
                            <p>Message Purpose</p>
                            <div>
                                <input type="radio" id="inquiry" name="purpose" value="inquiry">
                                <label for="inquiry">General Inquiry</label>
                            </div>
                            <div>
                                <input type="radio" id="reservation" name="purpose"
                                  value="reservation">
                                <label for="reservation">Reservation Question</label>
                            </div>
                            <div>
                                <input type="radio" id="website" name="purpose" value="website">
                                <label for="website">Website Suggestion</label>
                            </div>
                        </div>

                        <div class="form-item">
                            <label for="feedback">Message</label>
                            <textarea id="feedback" name="feedback" rows="4"
                              placeholder="Type here"></textarea>
                        </div>
                        <div class="form-item">
                            <label for="subscribe">Subscribe me to the monthly letter</label>
                            <input type="checkbox" id="subscribe" name="subscribe">
                        </div>

                        <button type="submit">Get in Touch!</button>
                    </fieldset>

                </form>
            </div>
        </section>

        <section>
            <h2>We are here to serve you</h2>
            <div class="employee">
                <figure>
                    <img src="images/employee1.webp" alt="portrait of an employee">
                    <figcaption>HR Manager</figcaption>
                </figure>
                <figure>
                    <img src="images/employee2.webp" alt="portrait of an employee">
                    <figcaption>VP of Operations</figcaption>
                </figure>
                <figure>
                    <img src="images/employee3.webp" alt="portrait of an employee">
                    <figcaption>Marketting Manager</figcaption>
                </figure>
            </div>
        </section>

    </main>

    <footer>
        <p>©️ 2026 | The Rapids | Jose Escoto </p>
        <nav class="socialmedia">
            <a href="https://facebook.com"><img src="images/facebook.svg" alt="facebook icon"></a>
            <a href="https://instagram.com"><img src="images/instagram.svg"
                  alt="instagram icon"></a>
            <a href="https://linkedin.com"><img src="images/linkedin.svg" alt="linkedin icon"></a>
        </nav>
    </footer>
</body>

</html>
